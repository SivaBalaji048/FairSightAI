services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:?Set this in .env}
      - PORT=8000
      - DATABASE_URL=sqlite:////app/data/fairlens.db
      - ALLOWED_ORIGINS=http://localhost:80,http://localhost:5173
    volumes:
      - sqlite_data:/app/data
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  sqlite_data:
